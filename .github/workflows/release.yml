name: Build & Release

permissions:
  contents: write
  id-token: write
  attestations: write

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "21.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: './dist/*'

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            ./dist/*